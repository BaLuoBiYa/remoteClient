<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>遥控器终端</title>
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body class="bg-dark text-white vh-100 overflow-hidden">

  <!-- ====== 首次启动弹窗 ====== -->
  <div class="modal-overlay" id="ws-modal" style="display:none;">
    <div class="modal-box panel-frame">
      <h3 class="h5 mb-3">🌐 配置 WebSocket 连接</h3>
      <p class="small mb-2">请输入 ROS2 桥接节点的 WebSocket 地址：</p>
      <input id="ws-url-input" class="form-control bg-dark text-white border-secondary mb-3" type="text"
        value="ws://NanoPi-M6.local:9090" placeholder="ws://host:port">
      <div class="d-flex justify-content-end gap-2">
        <button id="ws-modal-cancel" class="btn btn-secondary btn-sm">取消</button>
        <button id="ws-modal-confirm" class="btn btn-primary btn-sm">确认连接</button>
      </div>
    </div>
  </div>

  <div class="app-layout">

    <!-- ====== 左侧面板（宽度由 JS 控制，默认 66%） ====== -->
    <div class="left-pane" id="left-pane">

      <!-- 系统监控：上 2/3（高度由 JS 控制） -->
      <div class="panel-frame" id="monitor-pane">
        <h2 class="h6 border-bottom border-white border-opacity-25 pb-2 mb-2">📊 系统监控</h2>
        <div id="monitor-content" class="small overflow-auto">
          <p class="mb-1">CPU 使用率：<span id="cpu-usage" class="fw-bold">--</span>%</p>
          <p class="mb-1">内存使用率：<span id="mem-usage" class="fw-bold">--</span>%</p>
          <p class="mb-1">GPU 温度：<span id="gpu-temp" class="fw-bold">--</span>°C</p>
        </div>
      </div>

      <!-- 垂直分隔条 -->
      <div class="splitter splitter-h" id="splitter-v"></div>

      <!-- 参数调节：下 1/3 -->
      <div class="panel-frame" id="params-pane">
        <h2 class="h6 border-bottom border-white border-opacity-25 pb-2 mb-2">⚙️ 参数调节</h2>
        <div class="small mb-2">
          <label class="d-flex align-items-center gap-2 mb-0">
            <span>映射曲线：</span>
            <select id="curve-select" class="form-select form-select-sm bg-secondary text-white border-secondary"
              style="width:auto;">
              <option value="Linear">线性</option>
              <option value="Exponential" selected>指数</option>
              <option value="SCurve">S 曲线</option>
            </select>
          </label>
        </div>
        <div class="small mb-2">
          <label class="d-flex align-items-center gap-2 mb-0">
            <span>WS 地址：</span>
            <input id="ws-url-param" class="form-control form-control-sm bg-dark text-white border-secondary"
              type="text" style="flex:1;" placeholder="ws://host:port">
            <button id="ws-reconfig-btn" class="btn btn-outline-light btn-sm" title="重新配置连接">重设</button>
          </label>
          <small class="text-white-50" style="font-size:0.7rem;">⚠ 修改后需重启应用生效</small>
        </div>
        <div id="params-content" class="small overflow-auto"
          style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:6px; align-content:start;">
          <!-- 由 JS 动态生成滑块 -->
        </div>
      </div>

    </div>

    <!-- 水平分隔条 -->
    <div class="splitter splitter-v" id="splitter-h"></div>

    <!-- ====== 右侧面板：终端输出 ====== -->
    <div class="right-pane" id="right-pane">
      <div class="panel-frame h-100 d-flex flex-column">
        <h2 class="h6 border-bottom border-white border-opacity-25 pb-2 mb-2">🖥️ 终端输出</h2>
        <div id="terminal" class="terminal-body flex-grow-1 rounded overflow-auto">
          <pre id="terminal-output" class="m-0"></pre>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
